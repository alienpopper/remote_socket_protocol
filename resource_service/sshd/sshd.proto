syntax = "proto3";

package rsp.proto;

import "messages.proto";

message ConnectSshd {
    StreamID stream_id = 2;
    optional uint32 timeout_ms = 5;
    optional bool async_data = 8;
    optional bool use_socket = 9;
    optional bool share_socket = 10; //different nodeIDs are allowed to use this socket
}


