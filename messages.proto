syntax = "proto3";

package rsp.proto;

option optimize_for = LITE_RUNTIME;

message Uuid {
  bytes value = 1;
}

message NodeId {
  bytes value = 1; //uuid
}

message SocketID {
    bytes value = 1; //uuid
}

message DateTime {
  uint64 milliseconds_since_epoch = 1;
}

enum SIGNATURE_ALGORITHMS {
  SIGNATURE_ALGORITHM_UNSPECIFIED = 0;
  P256 = 100;
  RSA2048 = 200;
  RSA4096 = 201;
}

message SignatureBlock {
  NodeId signer = 1;
  SIGNATURE_ALGORITHMS algorithm = 2;
  bytes signature = 3;
}

message PublicKey {
    SIGNATURE_ALGORITHMS algorithm = 1;
    bytes public_key = 2;
}

message Endorsement {
  NodeId subject = 1;
  NodeId endorsement_service = 2;
  Uuid endorsement_type = 3;
  bytes endorsement_value = 4;
  DateTime valid_until = 5;
  bytes signature = 99;
}

message Identity {
    optional Uuid nonce = 1;
    PublicKey public_key = 2;
}

//Reply should be an Identity
message ChallengeRequest {
    Uuid nonce = 1;
}

message RouteEntry {
    NodeId node_id = 1;
    uint32 hops_away = 2;
    DateTime last_seen = 3;
}

message RouteUpdate {
    repeated RouteEntry entries = 2;
}

enum ERROR_CODE{
    UNKNOWN_ERROR = 0;
    UNKNOWN_MESSAGE_TYPE = 1;
}

message Error {
    ERROR_CODE error_code = 1;
    string message = 2;
}

message PingRequest {
    Uuid nonce = 1;
    uint32 sequence = 2;
    DateTime time_sent = 3;
}

message PingReply {
    Uuid nonce = 1;
    uint32 sequence = 2;
    DateTime time_sent = 3;
    DateTime time_replied = 4;
}

enum SOCKET_STATUS {
  SUCCESS = 0;
    CONNECT_REFUSED = 1;
    CONNECT_TIMEOUT = 2;
    SOCKET_CLOSED = 3;
    SOCKET_DATA = 4;
    SOCKET_ERROR = 5;
    NEW_CONNECTION = 6;
}

message SocketReply {
    SOCKET_STATUS error = 1;
    optional string message = 2;
    optional SocketID new_socket_id = 3;
    optional bytes data = 4;
}

message ConnectTCPReply {
  SocketReply reply = 1;
}


message ConnectTCPRequest {
    string host_port = 1;
    optional bool reuse_addr = 2;
    optional uint32 source_port = 3;
    optional uint32 timeout_ms = 4;
    optional uint32 retries = 5; //maximum 5
    optional uint32 retry_ms = 6; //maximum 5 seconds
    optional bool async_data = 7;
    optional bool use_socket = 8;
}


message SocketSend { 
   SocketID socket_number = 1;
   uint64 index = 3; //incrementing for out-of-order and missing
   bytes data = 2;
}

message SocketRecv {
    SocketID socket_number = 1;
    uint64 index = 3; //incrementing for out-of-order and missing
    optional uint32 max_bytes = 2;
    optional uint32 wait_ms = 4; //wait up to ms for max_bytes
}

message SocketClose {
    SocketID socket_number = 1;
}


message RSPMessage {
  //No destination means it's for whoever is on the other side of the transport link
  optional NodeId destination = 1;  
  NodeId source = 2;
  oneof submessage {
      ChallengeRequest challenge_request = 3;
      Identity identity = 4;
      RouteUpdate route = 5;
      Error error = 6;
      PingRequest ping_request = 7;
      PingReply ping_reply = 8;
      ConnectTCPRequest connect_tcp_request = 9;
      ConnectTCPReply connect_tcp_reply = 10;
  }
  SignatureBlock signature = 99;
  //endorsements are valid even if the signature is wrong
  repeated Endorsement endorsements = 100; 
}
