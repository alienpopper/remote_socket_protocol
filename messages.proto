syntax = "proto3";

package rsp.proto;

option optimize_for = LITE_RUNTIME;

message Uuid {
  bytes value = 1;
}

message NodeId {
  bytes value = 1; //uuid
}

message SocketID {
    bytes value = 1; //uuid
}

message EndorsementType {
    bytes value = 1; //uuid
}

message DateTime {
  uint64 milliseconds_since_epoch = 1;
}

enum SIGNATURE_ALGORITHMS {
  SIGNATURE_ALGORITHM_UNSPECIFIED = 0;
  P256 = 100;
  RSA2048 = 200;
  RSA4096 = 201;
}

message SignatureBlock {
  NodeId signer = 1;
  SIGNATURE_ALGORITHMS algorithm = 2;
  bytes signature = 3;
}

message PublicKey {
    SIGNATURE_ALGORITHMS algorithm = 1;
    bytes public_key = 2;
}

message Endorsement {
  NodeId subject = 1;
  NodeId endorsement_service = 2;
  Uuid endorsement_type = 3;
  bytes endorsement_value = 4;
  DateTime valid_until = 5;
  bytes signature = 99;
}

message Identity {
    optional Uuid nonce = 1;
    PublicKey public_key = 2;
}

//Reply should be an Identity
message ChallengeRequest {
    Uuid nonce = 1;
}

message RouteEntry {
    NodeId node_id = 1;
    uint32 hops_away = 2;
    DateTime last_seen = 3;
}

message RouteUpdate {
    repeated RouteEntry entries = 2;
}

message Address {
    uint32 ipv4 = 1;
    bytes ipv6 = 2;
}

message AddressRange{
    Address start_address = 1; //0 means any address
    Address end_address = 2;
}

message PortRange {
    uint32 start_port = 1; //0 means any port
    uint32 end_port = 2;
}

message ResourceTCPConnect{
    optional NodeId node_id = 1;
    repeated Address source_addresses = 2;
}

message ResourceTCPListen{
    optional NodeId node_id = 1;
    repeated Address listen_address = 2;
    PortRange allowed_range = 3;
}

message ResourceRecord{
    oneof resource_type {
        ResourceTCPConnect tcp_connect = 1;
        ResourceTCPListen tcp_listen = 2;
    }
}

message ResourceAdvertisement{
    repeated ResourceRecord records = 1;
}

message ResourceQuery{
    string query = 1;
    uint32 max_records = 2;
}

enum ERROR_CODE{
    UNKNOWN_ERROR = 0;
    UNKNOWN_MESSAGE_TYPE = 1;
}

message Error {
    ERROR_CODE error_code = 1;
    string message = 2;
}

message PingRequest {
    Uuid nonce = 1;
    uint32 sequence = 2;
    DateTime time_sent = 3;
}

message PingReply {
    Uuid nonce = 1;
    uint32 sequence = 2;
    DateTime time_sent = 3;
    DateTime time_replied = 4;
}

enum SOCKET_STATUS {
  SUCCESS = 0;
    CONNECT_REFUSED = 1;
    CONNECT_TIMEOUT = 2;
    SOCKET_CLOSED = 3;
    SOCKET_DATA = 4;
    SOCKET_ERROR = 5; //error reported from the underlying OS socket
    NEW_CONNECTION = 6;
    ASYNC_SOCKET = 7; //synchronous operation attempted on an async socket
    NODEID_MISMATCH = 9;
    INVALID_FLAGS = 10;
    SOCKET_IN_USE = 11;
    TIMED_OUT = 12;
}

message SocketReply {
    SocketID socket_id = 1;
    SOCKET_STATUS error = 2;
    optional string message = 3;
    optional string new_socket_remote_address = 4;
    optional SocketID new_socket_id = 5;  //RS chosen if async, client chosen if blocking
    optional int32 socket_error_code = 6; //error code reported from the underlying OS socket
    optional bytes data = 7;
}


message ConnectTCPRequest {
    string host_port = 1;
    SocketID socket_number = 2;
    optional bool reuse_addr = 3;
    optional uint32 source_port = 4;
    optional uint32 timeout_ms = 5;
    optional uint32 retries = 6; //maximum 5
    optional uint32 retry_ms = 7; //maximum 5 seconds
    optional bool async_data = 8;
    optional bool use_socket = 9;
    optional bool share_socket = 10; //different nodeIDs are allowed to use this socket
}

message ListenTCPRequest {
    string host_port = 1;
    SocketID socket_number = 2;
    optional bool reuse_addr = 3;
    optional uint32 timeout_ms = 4;
    optional bool async_accept = 5;
    optional bool share_listening_socket = 6; //different nodeIDs are allowed to use this socket
    optional bool share_child_sockets = 7; //only valid if async_accept
    optional bool children_use_socket = 8; //only valid if async_accept
    optional bool children_async_data = 9; //only valid if async_accept
}

message AcceptTCP {
    SocketID listen_socket_number = 1;
    optional SocketID new_socket_number = 2;  //if not provided, RS will choose one
    optional uint32 timeout_ms = 3;
    optional bool share_child_socket = 4;
    optional bool child_use_socket = 5;
  optional bool child_async_data = 6;
}

message SocketSend { 
   SocketID socket_number = 1;
   uint64 index = 3; //incrementing for out-of-order and missing
   bytes data = 2;
}

message SocketRecv {
    SocketID socket_number = 1;
    uint64 index = 3; //incrementing for out-of-order and missing
    optional uint32 max_bytes = 2;
    optional uint32 wait_ms = 4; //wait up to ms for max_bytes
}

message SocketClose {
    SocketID socket_number = 1;
}


/****Endorsement Server Messages ****/
enum ENSDORSMENT_STATUS {
    ENDORSEMENT_SUCCESS = 0;
    ENDORSEMENT_FAILED = 1;
    ENDORSEMENT_CHALLENGE = 2;
    ENDORSEMENT_INVALID_SIGNATURE = 3;
}


message BeginEndorsementRequest {
    Endorsement requested_values = 1; // requestor fills out values wanted
                                      // ES is allowed to change any field
                                      // Must be signed by the requestor
    optional bytes auth_data = 2;
}

message EndorsementChallenge {
    optional uint32 stage = 1;
    optional bytes challenge = 2;
}

message EndorsementChallengeReply {
    optional uint32 stage = 1;
    optional bytes challenge_reply = 2;
}

message EndorsementDone {
    ENSDORSMENT_STATUS status = 1;
    Endorsement new_endorsement = 2;
}


message RSPMessage {
  //No destination means it's for whoever is on the other side of the transport link
  optional NodeId destination = 1;  
  NodeId source = 2;
  oneof submessage {
      ChallengeRequest challenge_request = 3;
      Identity identity = 4;
      RouteUpdate route = 5;
      Error error = 6;
      PingRequest ping_request = 7;
      PingReply ping_reply = 8;
      ConnectTCPRequest connect_tcp_request = 9;
        SocketReply socket_reply = 10;
        SocketSend socket_send = 11;
        SocketRecv socket_recv = 12;
        SocketClose socket_close = 13;
        ListenTCPRequest listen_tcp_request = 14;
        AcceptTCP accept_tcp = 15;
        ResourceAdvertisement resource_advertisement = 16;
        ResourceQuery resource_query = 17;
          BeginEndorsementRequest begin_endorsement_request = 18;
          EndorsementChallenge endorsement_challenge = 19;
          EndorsementChallengeReply endorsement_challenge_reply = 20;
          EndorsementDone endorsement_done = 21;
  }
  SignatureBlock signature = 99;
  //endorsements are valid even if the signature is wrong
  repeated Endorsement endorsements = 100; 
}
