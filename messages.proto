syntax = "proto3";

package rsp.proto;

import "google/protobuf/any.proto";

message Uuid {
  bytes value = 1;
}

message StreamID {
    bytes value = 1; //uuid
}

message NodeId {
  bytes value = 1; //uuid
}

message EndorsementType {
    bytes value = 1; //uuid
}

message DateTime {
  uint64 milliseconds_since_epoch = 1;
}

message OptionalBool {
    bool value = 1;
}

enum STREAM_STATUS {
  SUCCESS = 0;
    CONNECT_REFUSED = 1;
    CONNECT_TIMEOUT = 2;
    STREAM_CLOSED = 3;
    STREAM_DATA = 4;
    STREAM_ERROR = 5; //error reported from the underlying OS socket
    NEW_CONNECTION = 6;
    ASYNC_STREAM = 7; //synchronous operation attempted on an async stream
    NODEID_MISMATCH = 9;
    INVALID_FLAGS = 10;
    STREAM_IN_USE = 11;
    TIMED_OUT = 12;
}

message StreamReply {
    StreamID stream_id = 1;
    STREAM_STATUS error = 2;
    optional string message = 3;
    optional string new_stream_remote_address = 4;
    optional StreamID new_stream_id = 5;  //RS chosen if async, client chosen if blocking
    optional int32 stream_error_code = 6; //error code reported from the underlying OS socket
    optional bytes data = 7;
}

message StreamSend {
   StreamID stream_id = 1;
   uint64 index = 3; //incrementing for out-of-order and missing
   bytes data = 2;
}

message StreamRecv {
    StreamID stream_id = 1;
    uint64 index = 3; //incrementing for out-of-order and missing
    optional uint32 max_bytes = 2;
    optional uint32 wait_ms = 4; //wait up to ms for max_bytes
}

message StreamClose {
    StreamID stream_id = 1;
}

enum SIGNATURE_ALGORITHMS {
  SIGNATURE_ALGORITHM_UNSPECIFIED = 0;
  P256 = 100;
  RSA2048 = 200;
  RSA4096 = 201;
}

message SignatureBlock {
  NodeId signer = 1;
  SIGNATURE_ALGORITHMS algorithm = 2;
  bytes signature = 3;
}

message PublicKey {
    SIGNATURE_ALGORITHMS algorithm = 1;
    bytes public_key = 2;
}

message Endorsement {
  NodeId subject = 1;
    NodeId endorsement_service = 2;
    Uuid endorsement_type = 3;
  bytes endorsement_value = 4;
  DateTime valid_until = 5;
  bytes signature = 99;
}

message Identity {
    optional Uuid nonce = 1;
    PublicKey public_key = 2;
}

//Reply should be an Identity
//if nonce is not present, any node can reply with an Identity from their cache
message ChallengeRequest {
    optional Uuid nonce = 1;
}

message RouteEntry {
    NodeId node_id = 1;
    uint32 hops_away = 2;
    DateTime last_seen = 3;
}

message RouteUpdate {
    repeated RouteEntry entries = 2;
}

message Address {
    uint32 ipv4 = 1;
    bytes ipv6 = 2;
}

message AddressRange{
    Address start_address = 1; //0 means any address
    Address end_address = 2;
}

message PortRange {
    uint32 start_port = 1; //0 means any port
    uint32 end_port = 2;
}

message ResourceTCPConnect{
    optional NodeId node_id = 1;
    repeated Address source_addresses = 2;
}

message ResourceTCPListen{
    optional NodeId node_id = 1;
    repeated Address listen_address = 2;
    PortRange allowed_range = 3;
}

message ResourceSSHD{
    optional NodeId node_id = 1;
    optional string server_name = 2;
}


message ResourceRecord{
    oneof resource_type {
        ResourceTCPConnect tcp_connect = 1;
        ResourceTCPListen tcp_listen = 2;
        ResourceSSHD sshd = 3;
    }
}

message ServiceSchema {
    string proto_file_name = 1;
    bytes proto_file_descriptor_set = 2; // Self-contained FileDescriptorSet
    repeated string accepted_type_urls = 3;
    bytes schema_hash = 4;              // SHA-256 of proto_file_descriptor_set
    uint32 schema_version = 5;          // Monotonically increasing version per proto_file_name
}

message SchemaRequest {
    optional string proto_file_name = 1;  // request schemas for a specific proto
    optional bytes schema_hash = 2;       // request a specific version by hash
}

message SchemaReply {
    repeated ServiceSchema schemas = 1;
}

message ResourceAdvertisement{
    repeated ResourceRecord records = 1;
    repeated ServiceSchema schemas = 2;
}

message ResourceQuery{
    string query = 1;
    uint32 max_records = 2;
}

message DiscoveredService {
    NodeId node_id = 1;
    ServiceSchema schema = 2;
}

message ResourceQueryReply {
    repeated DiscoveredService services = 1;
}

enum ERROR_CODE{
    UNKNOWN_ERROR = 0;
    UNKNOWN_MESSAGE_TYPE = 1;
    SIGNATURE_FAILED = 2;
    UNIMPLEMENTED = 3;
}

message Error {
    ERROR_CODE error_code = 1;
    string message = 2;
}

message PingRequest {
    Uuid nonce = 1;
    uint32 sequence = 2;
    DateTime time_sent = 3;
}

message PingReply {
    Uuid nonce = 1;
    uint32 sequence = 2;
    DateTime time_sent = 3;
    DateTime time_replied = 4;
}

enum LOG_LEVEL {
    LOG_LEVEL_UNSPECIFIED = 0;
    LOG_LEVEL_TRACE = 1;
    LOG_LEVEL_DEBUG = 2;
    LOG_LEVEL_INFO = 3;
    LOG_LEVEL_WARN = 4;
    LOG_LEVEL_ERROR = 5;
    LOG_LEVEL_FATAL = 6;
}

enum LOG_SUBSCRIPTION_STATUS {
    LOG_SUBSCRIPTION_STATUS_UNSPECIFIED = 0;
    LOG_SUBSCRIPTION_STATUS_ACCEPTED = 1;
    LOG_SUBSCRIPTION_STATUS_REMOVED = 2;
    LOG_SUBSCRIPTION_STATUS_INVALID = 3;
    LOG_SUBSCRIPTION_STATUS_NOT_FOUND = 4;
}

message LogSubscribeRequest {
    string payload_type_url = 1;
    LogASTMessageTree filter = 2;
    uint64 duration_ms = 3;
}

message LogSubscribeReply {
    LOG_SUBSCRIPTION_STATUS status = 1;
    Uuid subscription_id = 2;
    DateTime expires_at = 3;
    string message = 4;
}

message LogUnsubscribeRequest {
    Uuid subscription_id = 1;
}

message LogUnsubscribeReply {
    LOG_SUBSCRIPTION_STATUS status = 1;
    Uuid subscription_id = 2;
    string message = 3;
}

message LogRecord {
    Uuid subscription_id = 1;
    NodeId producer_node_id = 2;
    DateTime time_created = 3;
    google.protobuf.Any payload = 4;
}


/****Endorsement Server Messages ****/
enum ENSDORSMENT_STATUS {
    ENDORSEMENT_SUCCESS = 0;
    ENDORSEMENT_FAILED = 1;
    ENDORSEMENT_CHALLENGE = 2;
    ENDORSEMENT_INVALID_SIGNATURE = 3;
    ENDORSEMENT_UNKNOWN_IDENTITY = 4;
}


message BeginEndorsementRequest {
    Endorsement requested_values = 1; // requestor fills out values wanted
                                      // ES is allowed to change any field
                                      // Must be signed by the requestor
    optional bytes auth_data = 2;
}

message EndorsementChallenge {
    optional uint32 stage = 1;
    optional bytes challenge = 2;
}

message EndorsementChallengeReply {
    optional uint32 stage = 1;
    optional bytes challenge_reply = 2;
}

message EndorsementDone {
    ENSDORSMENT_STATUS status = 1;
    Endorsement new_endorsement = 2;
}

/***Endorsement AST Nodes ***/

message ERDASTEquals {
    ERDAbstractSyntaxTree lhs = 1;
    ERDAbstractSyntaxTree rhs = 2;
}

message ERDASTAnd {
    ERDAbstractSyntaxTree lhs = 1;
    ERDAbstractSyntaxTree rhs = 2;
}

message ERDASTOr {
    ERDAbstractSyntaxTree lhs = 1;
    ERDAbstractSyntaxTree rhs = 2;
}

message ERDASTAllOf {
    repeated ERDAbstractSyntaxTree terms = 1;
}

message ERDASTAnyOf {
    repeated ERDAbstractSyntaxTree terms = 1;
}


message ERDASTTrue {
}

message ERDASTFalse {
}

message ERDASTEndEquals {
    ERDASTEndTree lhs = 1;
    ERDASTEndTree rhs = 2;
}

message ERDASTEndAnd {
    ERDASTEndTree lhs = 1;
    ERDASTEndTree rhs = 2;
}

message ERDASTEndOr {
    ERDASTEndTree lhs = 1;
    ERDASTEndTree rhs = 2;
}

message ERDASTEndAllOf {
    repeated ERDASTEndTree terms = 1;
}

message ERDASTEndAnyOf {
    repeated ERDASTEndTree terms = 1;
}


message ERDASTEndTypeEquals {
    EndorsementType type = 1;
}

message ERDASTEndValueEquals {
    bytes value = 1;
}

message ERDASTEndSignerEquals {
    NodeId signer = 1;
}

message ERDASTEndTree {
    oneof node_type{
        ERDASTEndEquals equals = 1;
        ERDASTEndAnd and = 2;
        ERDASTEndOr or = 3;
        ERDASTTrue true_value = 9;
        ERDASTFalse false_value = 10;
        ERDASTEndAllOf all_of = 11;
        ERDASTEndAnyOf any_of = 12;
        ERDASTEndTypeEquals type_equals = 100;
        ERDASTEndValueEquals value_equals = 101;
        ERDASTEndSignerEquals signer_equals = 102;
    }
}

//This Test node should stop mixing and matching values/types/etc across endorsements
message ERDASTEndorsement {  
    ERDASTEndTree tree = 1;
}


message ERDASTMesEquals {
    ERDASTMessageTree lhs = 1;
    ERDASTMessageTree rhs = 2;
}

message ERDASTMesAnd {
    ERDASTMessageTree lhs = 1;
    ERDASTMessageTree rhs = 2;
}

message ERDASTMesOr {
    ERDASTMessageTree lhs = 1;
    ERDASTMessageTree rhs = 2;
}

message ERDASTMesAllOf {
    repeated ERDASTMessageTree terms = 1;
}

message ERDASTMesAnyOf {
    repeated ERDASTMessageTree terms = 1;
}

// A dot-separated path into a message, expressed as repeated segments.
// Examples:
//   ["destination", "value"]           – the bytes of the destination NodeId
//   ["signature", "signer", "value"]   – equivalent to legacy SOURCE()
//   ["service_message", "host_port"]   – field inside an unpacked Any
//   ["ping_request", "sequence"]       – a compile-time known field
message ERDASTFieldPath {
    repeated string segments = 1;
}

// A typed literal value to compare against.
message ERDASTFieldValue {
    oneof value {
        bytes   bytes_value   = 1;
        string  string_value  = 2;
        int64   int_value     = 3;
        uint64  uint_value    = 4;
        bool    bool_value    = 5;
        int32   enum_value    = 6;  // protobuf enum ordinal
    }
}

// Leaf: true when the field at the given path equals the literal value.
message ERDASTFieldEquals {
    ERDASTFieldPath path = 1;
    ERDASTFieldValue value = 2;
}

// Leaf: true when the field at the given path is present (has_xxx).
message ERDASTFieldExists {
    ERDASTFieldPath path = 1;
}

// Leaf: true when a repeated field (at path) contains at least one
// element whose sub-field (sub_path, relative to the element) equals value.
message ERDASTFieldContains {
    ERDASTFieldPath path = 1;       // path to the repeated field
    ERDASTFieldPath sub_path = 2;   // path within each element
    ERDASTFieldValue value = 3;
}

message LogASTFieldPath {
    repeated string segments = 1;
}

message LogASTFieldValue {
    oneof value {
        bytes   bytes_value   = 1;
        string  string_value  = 2;
        int64   int_value     = 3;
        uint64  uint_value    = 4;
        bool    bool_value    = 5;
        int32   enum_value    = 6;
    }
}

message LogASTFieldEquals {
    LogASTFieldPath path = 1;
    LogASTFieldValue value = 2;
}

message LogASTFieldExists {
    LogASTFieldPath path = 1;
}

message LogASTFieldContains {
    LogASTFieldPath path = 1;
    LogASTFieldPath sub_path = 2;
    LogASTFieldValue value = 3;
}

message LogASTMesEquals {
    LogASTMessageTree lhs = 1;
    LogASTMessageTree rhs = 2;
}

message LogASTMesAnd {
    LogASTMessageTree lhs = 1;
    LogASTMessageTree rhs = 2;
}

message LogASTMesOr {
    LogASTMessageTree lhs = 1;
    LogASTMessageTree rhs = 2;
}

message LogASTMesAllOf {
    repeated LogASTMessageTree terms = 1;
}

message LogASTMesAnyOf {
    repeated LogASTMessageTree terms = 1;
}

message LogASTMessageTree {
    oneof node_type {
        LogASTMesEquals equals = 1;
        LogASTMesAnd and = 2;
        LogASTMesOr or = 3;
        ERDASTTrue true_value = 9;
        ERDASTFalse false_value = 10;
        LogASTMesAllOf all_of = 11;
        LogASTMesAnyOf any_of = 12;
        LogASTFieldEquals field_equals = 200;
        LogASTFieldExists field_exists = 201;
        LogASTFieldContains field_contains = 202;
    }
}

message ERDASTMessageTree{
    oneof node_type{
        ERDASTMesEquals equals = 1;
        ERDASTMesAnd and = 2;
        ERDASTMesOr or = 3;
        ERDASTTrue true_value = 9;
        ERDASTFalse false_value = 10;
        ERDASTMesAllOf all_of = 11;
        ERDASTMesAnyOf any_of = 12;
        // Generic field-path leaves
        ERDASTFieldEquals field_equals = 200;
        ERDASTFieldExists field_exists = 201;
        ERDASTFieldContains field_contains = 202;
    }
}

message ERDASTMessage {
    ERDASTMessageTree tree = 1;
}

message ERDAbstractSyntaxTree {
    oneof node_type{
        ERDASTEquals equals = 1;
        ERDASTAnd and = 2;
        ERDASTOr or = 3;
        ERDASTTrue true_value = 9;
        ERDASTFalse false_value = 10;
        ERDASTAllOf all_of = 11;
        ERDASTAnyOf any_of = 12;
        ERDASTEndorsement endorsement = 100;
        ERDASTMessage message = 101;
    }
}

/*sent when a device needs an endorsment to process the message*/
/*throttled to 1 per second*/
message EndorsementNeeded {
    Uuid message_nonce = 1;
    ERDAbstractSyntaxTree tree = 2;
}


message RSPMessage {
  //No destination means it's for whoever is on the other side of the transport link
  optional NodeId destination = 1;  
    optional NodeId source = 2;
    OptionalBool trace = 24;

  // Core messages the RM understands at compile time
  oneof core_message {
      ChallengeRequest challenge_request = 3;
      Identity identity = 4;
      RouteUpdate route = 5;
      Error error = 6;
      PingRequest ping_request = 7;
      PingReply ping_reply = 8;
      ResourceAdvertisement resource_advertisement = 16;
      ResourceQuery resource_query = 17;
      EndorsementNeeded endorsement_needed = 23;
      SchemaRequest schema_request = 25;
      SchemaReply schema_reply = 26;
      ResourceQueryReply resource_query_reply = 27;
      LogSubscribeRequest log_subscribe_request = 28;
      LogSubscribeReply log_subscribe_reply = 29;
      LogUnsubscribeRequest log_unsubscribe_request = 30;
      LogUnsubscribeReply log_unsubscribe_reply = 31;
      LogRecord log_record = 32;
  }

  // Service-specific payload — opaque to RM at compile time.
  // The RM validates structure by looking up the destination node's
  // registered ServiceSchema.
  google.protobuf.Any service_message = 200;

    Uuid nonce = 22;
  SignatureBlock signature = 99;
  //endorsements are valid even if the signature is wrong
  repeated Endorsement endorsements = 100; 
  //identities are valid even if the signature is wrong
  repeated Identity identities = 101;
}
