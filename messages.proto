syntax = "proto3";

package rsp.proto;

option optimize_for = LITE_RUNTIME;

message Uuid {
  bytes value = 1;
}

message NodeId {
  bytes value = 1;
}

message DateTime {
  uint64 milliseconds_since_epoch = 1;
}

message Endorsement {
  NodeId subject = 1;
  NodeId endorsement_service = 2;
  Uuid endorsement_type = 3;
  bytes endorsement_value = 4;
  DateTime valid_until = 5;
  bytes signature = 6;
}

message ChallengeRequest {
    Uuid nonce = 1;
}

message ChallengeReply {
    Uuid nonce = 1;
}

message RouteEntry {
    NodeId nodeID = 1;
    uint32 hops_away = 2;
    DateTime last_seen = 3;
}

message RouteUpdate {
    NodeId link = 1;
    repeated RouteEntry entries = 2;
}

message RSPMessage {
  optional NodeId destination = 1;  //RouteUpdate doesn't require a destination
  NodeId source = 2;
    oneof submessage {
        ChallengeRequest challenge_request = 3;
        ChallengeReply challenge_reply = 4;
        RouteUpdate route = 5;
    }
  bytes signature = 99;
}
