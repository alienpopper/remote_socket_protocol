syntax = "proto3";

package rsp.proto;

option optimize_for = LITE_RUNTIME;

message Uuid {
  bytes value = 1;
}

message NodeId {
  bytes value = 1;
}

message DateTime {
  uint64 milliseconds_since_epoch = 1;
}

message Endorsement {
  NodeId subject = 1;
  NodeId endorsement_service = 2;
  Uuid endorsement_type = 3;
  bytes endorsement_value = 4;
  DateTime valid_until = 5;
  bytes signature = 6;
}

message ChallengeRequest {
    Uuid nonce = 1;
}

message ChallengeReply {
    Uuid nonce = 1;
    bytes signature = 2;
}

message RSPMessage {
  NodeId destination = 1;
  NodeId source = 2;
    oneof submessage {
        ChallengeRequest challenge_request = 3;
        ChallengeReply challenge_reply = 4;
    }
}
